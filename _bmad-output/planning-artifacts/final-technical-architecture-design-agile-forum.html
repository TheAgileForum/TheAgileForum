<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Final Technical Architecture - Agile Forum</title>
  <style>
    :root {
      --bg: #f4f7ff;
      --card: #ffffff;
      --ink: #1f2937;
      --muted: #64748b;
      --h1: #0f172a;
      --h2: #1d4ed8;
      --h3: #7c3aed;
      --accent: #0ea5e9;
      --accent-soft: #e0f2fe;
      --border: #dbe2f0;
      --code-bg: #111827;
      --code-ink: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.65;
      padding: 28px;
    }
    main.page {
      max-width: 1180px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 34px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.06);
    }
    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 16px;
      padding: 10px 12px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    h1, h2, h3 {
      line-height: 1.25;
      margin-top: 1.4em;
    }
    h1 {
      color: var(--h1);
      font-size: 2.05rem;
      margin-top: 0;
      border-bottom: 3px solid var(--accent);
      padding-bottom: 10px;
    }
    h2 {
      color: var(--h2);
      font-size: 1.45rem;
      border-left: 5px solid var(--accent);
      padding-left: 10px;
      margin-top: 2.1rem;
    }
    h3 {
      color: var(--h3);
      font-size: 1.1rem;
      margin-top: 1.35rem;
    }
    p {
      margin: 0.5rem 0 0.85rem;
    }
    ul, ol {
      padding-left: 1.3rem;
      margin: 0.4rem 0 0.9rem;
    }
    li {
      margin: 0.25rem 0;
    }
    code {
      background: var(--accent-soft);
      color: #0c4a6e;
      border: 1px solid #bae6fd;
      border-radius: 6px;
      padding: 2px 6px;
      font-weight: 600;
    }
    pre {
      background: var(--code-bg);
      color: var(--code-ink);
      border-radius: 10px;
      padding: 14px 16px;
      overflow: auto;
      border: 1px solid #1f2937;
    }
    pre code {
      background: none;
      border: none;
      color: inherit;
      padding: 0;
      font-weight: 500;
    }
    .fallback {
      margin-top: 14px;
      padding: 12px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="page">
    <div class="meta">
      Generated view for <code>final-technical-architecture-design-agile-forum.md</code>
    </div>
    <article id="content"><p>Loading architecture document...</p></article>
    <div id="fallback" class="fallback hidden">
      Could not render Markdown dynamically in this environment. Open the Markdown source file directly:
      <code>final-technical-architecture-design-agile-forum.md</code>
    </div>
  </main>

  <script>
    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function applyInline(text) {
      return text
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    }

    function renderBasicMarkdown(md) {
      const lines = md.replace(/\r\n/g, "\n").split("\n");
      let html = "";
      let inUl = false;
      let inOl = false;
      let inCode = false;
      let inFrontmatter = false;
      let frontmatterSeen = 0;

      function closeLists() {
        if (inUl) { html += "</ul>"; inUl = false; }
        if (inOl) { html += "</ol>"; inOl = false; }
      }

      for (const raw of lines) {
        const line = raw;

        if (line.trim() === "---" && frontmatterSeen < 2) {
          frontmatterSeen += 1;
          inFrontmatter = frontmatterSeen === 1;
          if (frontmatterSeen === 2) inFrontmatter = false;
          continue;
        }
        if (inFrontmatter) continue;

        if (line.startsWith("```")) {
          closeLists();
          if (!inCode) {
            inCode = true;
            html += "<pre><code>";
          } else {
            inCode = false;
            html += "</code></pre>";
          }
          continue;
        }

        if (inCode) {
          html += escapeHtml(line) + "\n";
          continue;
        }

        if (/^###\s+/.test(line)) {
          closeLists();
          html += "<h3>" + applyInline(escapeHtml(line.replace(/^###\s+/, ""))) + "</h3>";
          continue;
        }
        if (/^##\s+/.test(line)) {
          closeLists();
          html += "<h2>" + applyInline(escapeHtml(line.replace(/^##\s+/, ""))) + "</h2>";
          continue;
        }
        if (/^#\s+/.test(line)) {
          closeLists();
          html += "<h1>" + applyInline(escapeHtml(line.replace(/^#\s+/, ""))) + "</h1>";
          continue;
        }

        const ulMatch = line.match(/^\s*-\s+(.+)$/);
        if (ulMatch) {
          if (!inUl) {
            if (inOl) { html += "</ol>"; inOl = false; }
            html += "<ul>";
            inUl = true;
          }
          html += "<li>" + applyInline(escapeHtml(ulMatch[1])) + "</li>";
          continue;
        }

        const olMatch = line.match(/^\s*\d+\.\s+(.+)$/);
        if (olMatch) {
          if (!inOl) {
            if (inUl) { html += "</ul>"; inUl = false; }
            html += "<ol>";
            inOl = true;
          }
          html += "<li>" + applyInline(escapeHtml(olMatch[1])) + "</li>";
          continue;
        }

        if (line.trim() === "") {
          closeLists();
          continue;
        }

        closeLists();
        html += "<p>" + applyInline(escapeHtml(line)) + "</p>";
      }

      closeLists();
      if (inCode) html += "</code></pre>";
      return html;
    }

    async function loadAndRender() {
      const contentEl = document.getElementById("content");
      const fallbackEl = document.getElementById("fallback");
      try {
        const response = await fetch("./final-technical-architecture-design-agile-forum.md");
        if (!response.ok) throw new Error("Markdown fetch failed");
        const md = await response.text();
        contentEl.innerHTML = renderBasicMarkdown(md);
      } catch (err) {
        contentEl.innerHTML = "<p>Unable to render in-browser Markdown view.</p>";
        fallbackEl.classList.remove("hidden");
      }
    }

    loadAndRender();
  </script>
</body>
</html>
