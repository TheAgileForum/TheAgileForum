name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - sprint/**
      - feature/**

jobs:
  client:
    name: Client Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  server:
    name: Server Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agileforum
          POSTGRES_PASSWORD: agileforum
          POSTGRES_DB: agileforum_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agileforum -d agileforum_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://agileforum:agileforum@localhost:5432/agileforum_test
      DIRECT_URL: postgresql://agileforum:agileforum@localhost:5432/agileforum_test
      CATALOG_USE_DB: "true"
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-must-be-32-chars-min!!
      INTEGRATION_PROVIDER_MODE: stub
      STRIPE_WEBHOOK_SECRET: whsec_stub
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Unit tests
        run: npm test

      - name: Deploy database migrations
        run: npm run db:deploy

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build
